# vhs-audio.conf — VHS/tape audio effect for PipeWire
#
# Creates a virtual "VHS Audio" sink that applies:
#   - Sub-bass cut       (tape hum / rumble removal)
#   - Bass warmth        (+4 dB @ 90 Hz — tape head resonance)
#   - Low-mid honk       (+1.5 dB @ 350 Hz — tape congestion)
#   - Upper-mid dip      (-3 dB @ 3 kHz — loss of presence/clarity)
#   - High-freq rolloff  (-9 dB shelf @ 5 kHz — tape bandwidth limit)
#   - Hard LP @ 8 kHz    (VHS LP-mode audio ceiling)
#
# Run as a standalone PipeWire client:
#   pipewire --config /path/to/vhs-audio.conf &
#
# Then route audio to the "VHS Audio" sink via pavucontrol or PULSE_SINK.

context.properties = { log.level = 0 }

context.spa-libs = {
    audio.convert.* = audioconvert/libspa-audioconvert
    support.*       = support/libspa-support
}

context.modules = [
    { name = libpipewire-module-rt          flags = [ ifexists nofail ] }
    { name = libpipewire-module-protocol-native }
    { name = libpipewire-module-client-node }
    { name = libpipewire-module-adapter }

    { name = libpipewire-module-filter-chain
        args = {
            node.description = "VHS Audio"
            media.name       = "VHS Audio"

            filter.graph = {
                nodes = [
                    # ── Remove sub-bass rumble (40 Hz HP) ─────────────────
                    {
                        type    = builtin
                        name    = hp
                        label   = bq_highpass
                        control = { "Freq" = 40.0  "Q" = 0.7 }
                    }

                    # ── Tape head bass resonance (+4 dB @ 90 Hz) ──────────
                    {
                        type    = builtin
                        name    = bass
                        label   = bq_peaking
                        control = { "Freq" = 90.0  "Q" = 1.1  "Gain" = 4.0 }
                    }

                    # ── Low-mid tape congestion (+1.5 dB @ 350 Hz) ────────
                    {
                        type    = builtin
                        name    = lo_mid
                        label   = bq_peaking
                        control = { "Freq" = 350.0  "Q" = 1.4  "Gain" = 1.5 }
                    }

                    # ── Upper-mid presence dip (-3 dB @ 3 kHz) ────────────
                    {
                        type    = builtin
                        name    = hi_mid
                        label   = bq_peaking
                        control = { "Freq" = 3000.0  "Q" = 0.85  "Gain" = -3.0 }
                    }

                    # ── High-frequency shelf rolloff (-9 dB @ 5 kHz) ──────
                    {
                        type    = builtin
                        name    = hi_shelf
                        label   = bq_highshelf
                        control = { "Freq" = 5000.0  "Q" = 0.8  "Gain" = -9.0 }
                    }

                    # ── Hard bandwidth ceiling (LP @ 8 kHz, VHS LP mode) ──
                    {
                        type    = builtin
                        name    = lp
                        label   = bq_lowpass
                        control = { "Freq" = 8000.0  "Q" = 1.1 }
                    }
                ]

                links = [
                    { output = "hp:Out"       input = "bass:In"     }
                    { output = "bass:Out"     input = "lo_mid:In"   }
                    { output = "lo_mid:Out"   input = "hi_mid:In"   }
                    { output = "hi_mid:Out"   input = "hi_shelf:In" }
                    { output = "hi_shelf:Out" input = "lp:In"       }
                ]
            }

            audio.channels = 2
            audio.position = [ FL FR ]

            capture.props = {
                node.name        = "effect_input.vhs_audio"
                node.description = "VHS Audio"
                media.class      = Audio/Sink
            }
            playback.props = {
                node.name   = "effect_output.vhs_audio"
                node.passive = true
            }
        }
    }
]
